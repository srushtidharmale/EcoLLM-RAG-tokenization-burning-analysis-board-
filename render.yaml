# Public live demo on Render (no login required for visitors)
# https://render.com → New + → Blueprint → connect this GitHub repo
services:
  - type: web
    name: ecollm-rag-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
